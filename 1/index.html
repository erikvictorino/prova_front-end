<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>Controle de Gastos</title>
</head>
<body>

  <div class="container">
    <h1>Controle de Gastos</h1>

    <div class="total-card">
      <span class="total-label">Total Gasto no Mês</span>
      <span class="total-value" id="total">R$ 0,00</span>
    </div>

    <div class="form-row">
      <input type="text" id="desc" placeholder="Descrição" />
      <input type="number" id="valor" placeholder="Valor (R$)" min="0" step="0.01" />
      <select id="cat">
        <option value="">Categoria</option>
        <option>Alimentação</option>
        <option>Transporte</option>
        <option>Saúde</option>
        <option>Lazer</option>
        <option>Outros</option>
      </select>
      <button onclick="adicionar()">Adicionar</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Descrição</th>
          <th>Categoria</th>
          <th>Valor</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="lista">
        <tr><td colspan="4" class="empty">Nenhum gasto registrado.</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    let gastos = [];

    function adicionar() {
      const desc = document.getElementById('desc').value.trim();
      const valor = parseFloat(document.getElementById('valor').value);
      const cat = document.getElementById('cat').value;

      if (!desc || isNaN(valor) || valor <= 0 || !cat) {
        alert('Preencha todos os campos corretamente.');
        return;
      }

      gastos.push({ id: Date.now(), desc, valor, cat });

      document.getElementById('desc').value = '';
      document.getElementById('valor').value = '';
      document.getElementById('cat').value = '';

      renderizar();
    }

    function remover(id) {
      gastos = gastos.filter(function(g) { return g.id !== id; });
      renderizar();
    }

    function renderizar() {
      const lista = document.getElementById('lista');
      const total = gastos.reduce(function(soma, g) { return soma + g.valor; }, 0);

      document.getElementById('total').textContent =
        'R$ ' + total.toFixed(2).replace('.', ',');

      if (gastos.length === 0) {
        lista.innerHTML = '<tr><td colspan="4" class="empty">Nenhum gasto registrado.</td></tr>';
        return;
      }

      lista.innerHTML = gastos.map(function(g) {
        const alto = g.valor > 100;
        return '<tr>' +
          '<td>' + g.desc + '</td>' +
          '<td>' + g.cat + '</td>' +
          '<td class="' + (alto ? 'alto' : '') + '">' + (alto ? '⚠ ' : '') + 'R$ ' + g.valor.toFixed(2).replace('.', ',') + '</td>' +
          '<td><button class="btn-del" onclick="remover(' + g.id + ')">✕</button></td>' +
          '</tr>';
      }).join('');
    }
  </script>

</body>
</html>
